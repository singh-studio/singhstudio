<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Director CV | Singh Studio</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.34/dist/lenis.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/swup@4"></script>
</head>
<body>

    <nav class="nav grid-container">
        <a href="index.html" class="link-underline text-meta" style="pointer-events: auto;">Singh Studio</a>
        <div style="display: flex; gap: 2rem; pointer-events: auto;">
            <a href="about.html" class="link-underline text-meta">Studio</a>
            <a href="portfolio.html" class="link-underline text-meta">Work</a>
        </div>
    </nav>

    <main id="swup-main" class="transition-fade">
        
        <section class="grid-container grid-12" style="padding-top: 25vh; margin-bottom: var(--space-xl);">
            <div class="col-span-8 col-start-1">
                <p class="text-meta reveal-text" style="margin-bottom: var(--space-sm);">Curriculum Vitae</p>
                <h1 class="text-h2 reveal-text">[Your Name]</h1>
                <p class="text-muted reveal-text" style="margin-top: 1rem;">Strategic Communications & Creative Director</p>
            </div>
        </section>

        <section class="grid-container grid-12 reveal-text" style="margin-bottom: var(--space-xl);">
            <div class="col-span-3 col-start-1"><h3 class="text-meta">Experience</h3></div>
            <div class="col-span-6 col-start-5" style="border-top: 1px solid var(--color-border); padding-top: var(--space-md);">
                
                <div style="margin-bottom: var(--space-lg);">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                        <h4 class="font-display text-h3">Singh Studio</h4>
                        <span class="text-meta text-muted">2024 — Present</span>
                    </div>
                    <p class="text-meta" style="margin-bottom: 1rem;">Founder & Creative Director</p>
                    <p class="text-muted">Leading strategic communications and digital design projects for premium clients.</p>
                </div>

            </div>
        </section>

    </main>

    <script src="assets/js/main.js"></script>
</body>
</html>
