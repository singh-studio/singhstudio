<!DOCTYPE html>

    <script src="https://unpkg.com/@studio-freight/lenis@1.0.34/dist/lenis.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <nav class="nav grid-container">

    <main id="swup-main" class="transition-fade">
        
        <section class="grid-container grid-12" style="padding-top: 25vh; min-height: 80vh;">

            </div>
        </section>

        <footer class="grid-container grid-12" style="padding: var(--space-lg) 0 var(--space-md); border-top: 1px solid var(--color-border);">
            <div class="col-span-4">
                <p class="text-meta">© 2026 Singh Studio</p>
            </div>
            <div class="col-span-8" style="text-align: right;">
